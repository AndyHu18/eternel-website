<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ÉTERNEL — 永恆之愛・奢華典藏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Hero -->
    <section class="hero">
      <div class="hero-image">
        <img src="images/hero.jpg" alt="ÉTERNEL" />
      </div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="logo">
          <div class="logo-ornament" aria-hidden="true">
            <span class="ornament-line"></span>
            <span class="ornament-dot"></span>
            <span class="ornament-line"></span>
          </div>
          <h1 class="logo-text">ÉTERNEL</h1>
          <p class="logo-subtitle">永恆之愛・奢華典藏</p>
        </div>
        <div class="hero-badge">
          <span>探索永恆之愛</span>
        </div>
      </div>
    </section>

    <!-- Navigation -->
    <nav class="main-nav">
      <ul>
        <li><a href="#about">關於</a></li>
        <li><a href="#collection">典藏</a></li>
        <li><a href="#community">社群</a></li>
        <li><a href="#stories">故事</a></li>
        <li><a href="#gallery">藝廊</a></li>
        <li><a href="#contact">聯繫</a></li>
      </ul>
    </nav>

    <!-- Tagline -->
    <section class="tagline">
      <h2 class="tagline-main">愛，值得被永恆收藏。</h2>
      <p class="tagline-body">我們不販售珠寶。我們守護承諾。</p>
      <p class="tagline-detail">
        每一件 ÉTERNEL 作品，都是一段愛情的見證。<br />
        不隨時間褪色，不因歲月妥協。
      </p>
      <div class="lang-toggle">
        <span class="active">中</span>
        <span>EN</span>
      </div>
    </section>

    <!-- Showcase -->
    <section class="showcase">
      <div class="showcase-grid">
        <div class="category-card">
          <img src="images/card1.jpg" alt="珠寶" />
          <div class="category-overlay"><h3>珠寶</h3></div>
        </div>
        <div class="category-card">
          <img src="images/card2.jpg" alt="故事" />
          <div class="category-overlay"><h3>故事</h3></div>
        </div>
        <div class="category-card">
          <img src="images/card3.jpg" alt="情書" />
          <div class="category-overlay"><h3>情書</h3></div>
        </div>
        <div class="category-card">
          <img src="images/card4.jpg" alt="典藏" />
          <div class="category-overlay"><h3>典藏</h3></div>
        </div>
        <div class="diamond-area">
          <img src="images/diamond.jpg" alt="Diamond Ring" />
        </div>
      </div>

      <!-- Feature Row -->
      <div class="feature-row">
        <h2 class="feature-left">前所未見的愛情。<br />此刻綻放。</h2>
        <p class="feature-right">
          走進 ÉTERNEL 的世界，<br />見證永恆的第一人。
        </p>
      </div>
    </section>

    <!-- CTA -->
    <section class="cta-section">
      <a href="#about" class="cta-button">探索品牌</a>
    </section>

    <!-- Subscribe -->
    <footer class="subscribe">
      <div class="subscribe-inner">
        <div class="subscribe-text">
          <p>訂閱 ÉTERNEL，收到以愛為名的獨家資訊。</p>
        </div>
        <div class="subscribe-form">
          <input type="email" placeholder="電子郵件" aria-label="電子郵件" />
          <button type="submit">訂閱</button>
        </div>
      </div>
    </footer>
  </body>
</html>
